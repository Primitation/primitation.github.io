<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primitation's Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

            <button id="menu-button">&#9776;</button> <!-- Hamburger icon -->
            <nav id="mobile-menu">

                <a href="#portfolio">Portfolio</a>

        </footer>

    <script src="js/ParticlesBackground.js"></script>
    <script src="js/ContentDisplay.js"></script>
    <script src="js/MobileMenuToggle.js"></script>
    <!-- ThreeJson Files -->

    <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>
